name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      # uv sync builds lerobot as an editable path dependency
      # (pyproject: lerobot = { path = "references/lerobot", editable = true }),
      # so that one submodule must be present. The other references/ submodules
      # are reference-only and not needed to build/test.
      - name: Init the lerobot submodule (editable dependency)
        run: git submodule update --init --depth 1 references/lerobot

      - name: Install uv (Python 3.12)
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies (incl. dev tools)
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (src only)
        run: uv run mypy src

      - name: Unit tests (no hardware)
        run: uv run pytest -m 'not hardware'
