name: Update submodules

# Weekly refresh of the vendored references/ submodules to their upstream tips.
# Commits any gitlink bumps as lanhp-vn and pushes to the default branch.
# Excludes references/lerobot: it is an editable build dependency, so an
# unreviewed upstream bump could break `uv sync`. Bump lerobot deliberately.
# Excludes references/optomed-camera/nous_vclient: it is a private repo the
# runner's GITHUB_TOKEN cannot reach (token is scoped to this repo only), so a
# recursive checkout or --remote bump fails to clone it. Bump it locally.

on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-submodules
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          # Do not auto-clone submodules here: a recursive clone would fail on
          # the private nous_vclient. The update step inits only the paths it
          # bumps (--init), so the runner never touches the unreachable one.
          submodules: false
          fetch-depth: 0

      - name: Update reference submodules to upstream (excluding lerobot, nous_vclient)
        shell: bash  # mapfile / process substitution / array expansion are bash builtins
        run: |
          mapfile -t paths < <(
            git config --file .gitmodules --get-regexp '^submodule\..*\.path$' \
              | awk '{print $2}' \
              | grep -vE '^references/(lerobot|optomed-camera/nous_vclient)$'
          )
          # Fail safe: an empty list would make `git submodule update` touch ALL
          # submodules, re-introducing the private nous_vclient clone failure.
          if [ "${#paths[@]}" -eq 0 ]; then
            echo "No submodule paths resolved from .gitmodules — aborting." >&2
            exit 1
          fi
          echo "Updating: ${paths[*]}"
          # --depth 1: shallow-fetch the upstream tip instead of full history.
          # checkout uses submodules:false, so each listed submodule (incl. the
          # large CV ones: opencv, opencv_contrib, mediapipe, RETFound) is cloned
          # fresh each run; shallow keeps that cheap. --remote tracks the branch
          # tip, so depth 1 of that tip is self-consistent.
          git submodule update --init --remote --depth 1 -- "${paths[@]}"

      - name: Commit and push if anything changed
        run: |
          git config user.name "lanhp-vn"
          git config user.email "phamhoanglanhb@gmail.com"
          if git diff --quiet; then
            echo "No submodule updates."
          else
            git add -A
            git commit -m "chore(deps): update references/ submodules to upstream"
            # Assumes main lets the Actions bot (default GITHUB_TOKEN) push directly.
            # If main becomes branch-protected, switch this to a PR-based bump.
            git push
          fi
