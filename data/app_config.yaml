schema_version: 1

# Arm bus settings. Default port matches the host's Waveshare bus adapter for
# the SO-ARM101 (12 V STS3215 bus). Update on first run if your host differs.
# (The hand bus port/baudrate live in the hand calibration YAML, not here.)
arm:
  port: COM20

# Safety thresholds read by the diagnostics scan (scripts/diagnostics/scan.py),
# plus the gentle velocity used for safe home moves.
# Temperature is the servo's internal coil temp (read_present_temperature), not
# ambient. Voltage threshold is percent-deviation from each bus's nominal.
safety:
  temp_warn_c: 50          # servo coil temp warn threshold (°C)
  voltage_warn_pct: 5.0    # warn when bus voltage deviates this % from nominal
  safe_park:
    park_velocity_arm: 600 # STS3215 Goal_Velocity register units for gentle home moves
