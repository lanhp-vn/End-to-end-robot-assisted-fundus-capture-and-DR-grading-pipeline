# arm_config.yaml -- SO-ARM101 operator config (single tuning surface).
# connection/safety/tuning are hand-editable; 'poses' is written by jog.py /
# capture_pose.py. Comments are regenerated on save -- see data/README.md for
# what each tuning knob means. 'home' is the default parking / safe-park pose.
schema_version: 1
connection:
  port: COM20
safety:
  temp_warn_c: 50.0
  voltage_warn_pct: 5.0
tuning:
  park_velocity: 600
  jog_step_min: 1.0
  jog_step_max: 15.0
  jog_step_default: 5.0
  jog_step_increment: 1.0
  load_warn: 600
  load_stall: 600
  sweep_margin_default: 90.0
  settle_sweep_s: 1.2
  settle_set_pose_s: 2.0
  settle_capture_s: 0.5
  home_tolerance_steps: 25
  home_timeout_s: 8.0
  home_poll_s: 0.05
poses:
  home:
    shoulder_pan: 81.49450549450549
    shoulder_lift: -104.52747252747253
    elbow_flex: 90.94505494505495
    wrist_flex: -92.3076923076923
    wrist_roll: -0.3076923076923077
  grab:
    shoulder_pan: 84.21978021978022
    shoulder_lift: -102.68131868131869
    elbow_flex: 90.85714285714286
    wrist_flex: 31.64835164835165
    wrist_roll: -84.96703296703296
