# src/arm101_hand/data/system_camera_config.yaml
# system_camera_config.yaml -- arm-mounted USB OBSERVATION camera (films the Optomed Aurora's
# screen). Live cv2 preview window + 'r' record. Distinct from the Aurora fundus camera
# (see fundus_config.yaml). Hand-editable; never written by runtime code (IL-5).
schema_version: 8
enabled: true
camera_index: 1     # the arm cam on this PC (index 0 is the built-in webcam)
backend: dshow      # REQUIRED for manual focus: only DSHOW drives this cam's VCM (MSMF accepts the
                    # CAP_PROP_FOCUS calls but doesn't move the lens). DSHOW also handles the stream
                    # open by index on this unit.
window_title: "Arm cam (Optomed view)"
# Manual focus: the arm + camera + Aurora screen geometry is fixed, so one lens position keeps the
# screen permanently sharp -- no autofocus hunting onto the room behind it, no breathing while
# recording. autofocus:false locks it; focus:600 came from usb_camera_focus_probe.py (the manual
# sweep peak, ~3x the autofocus baseline; AF itself settled at 599). Needs backend:dshow above.
autofocus: false
focus: 600
record_dir: media_outputs/camera_recordings   # repo-relative; 'r' writes usb_cam_<timestamp>.avi here
fps:                # null -> camera-reported fps (fallback 20)
# This cam = IFWATER IF-USB12MP02AF (IMX362, USB 2.0): 4000x3000 sensor max, MJPG-only for hi-res
# (YUY2 is uncompressed + capped low). _apply_format (preview.py) brackets the size with MJPG so the
# driver can't silently fall back to YUY2 (which would crush USB-2.0 fps -- see system_camera memory).
#
# The LIVE stream (width/height) runs at 2560x1440 (QHD, 16:9) -- used by the preview, recording, AND
# arc detection everywhere. This cam has two USB-2.0 MJPG bandwidth tiers (enumerate with
# scripts/diagnostics/system_camera/usb_camera_modes.py): the small 4:3 modes (<=1600x1200) hold ~44 fps,
# the 4:3 hi-res modes (2048x1536 / 2592x1944 / 4000x3000) collapse to ~15 fps, but the 16:9 lane
# (1280x720 / 1920x1080 / 2560x1440 / 3840x2160) holds ~29 fps. 2560x1440 is the most detail available
# at that ~29 fps tier -- ~1.9x the pixels of the old 1600x1200 stream for a 44->29 fps trade, and it
# clears the ~15 fps 4:3 hi-res cliff entirely. The fixed ROI crops just the Aurora screen and resizes
# to its calibration reference (screen_roi ref_w x ref_h), so the preview/recording/detection frame
# size is unchanged.
# IMPORTANT -- this is a resolution AND aspect-ratio change (4:3 -> 16:9): the Aurora screen lands at a
# new place/scale in the frame (and 16:9 on this 4:3 sensor may crop the vertical FOV), so the existing
# screen_roi + arc bands no longer track it. Re-run scripts/calibration/system_camera/calibrate_view.py
# to re-derive screen_roi + the arc bands before relying on the ROI zoom or the AUTO trigger.
# Set width/height to null to request the driver's max (4000x3000 @ ~15 fps) instead.
fourcc: MJPG
width: 2560         # live stream @ QHD 16:9 (~29 fps); re-run calibrate_view.py after this aspect change
height: 1440
# Screen ROI -- the crop that zooms the preview/recording/detection onto just the Aurora screen.
# Re-derived by scripts/calibration/system_camera/calibrate_view.py; ref_w/ref_h = the resolution it
# was calibrated at, so the runtime rescale is identity. Default below = the legacy AURORA_SCREEN_ROI
# (640x480 ref). Run the calibration after any resolution OR lighting change.
# ROI cut is 4:3 (640x480 ref). Values below are rescaled from the prior 5:3/800-ref capture as a
# placeholder -- re-run calibrate_view.py to re-derive screen_roi + arcs for the 4:3 cut.
screen_roi: {x: 98, y: 47, w: 128, h: 128, ref_w: 640, ref_h: 480, angle: -0.5}
# --- Automated trigger (grab_auto_trigger_analysis.py) -------------------------------------------
# Red-only: each arc is RED (>= coverage_threshold) or not; a capture fires after BOTH arcs go RED
# (misaligned) then BOTH go not-red (aligned), held stable_seconds. Regions/bands are STARTING
# ESTIMATES -- re-derive with scripts/calibration/system_camera/calibrate_view.py.
auto_trigger:
  left_arc: {x: 46, y: 80, w: 85, h: 330, ref_w: 640, ref_h: 480, angle: 0.0}
  right_arc: {x: 518, y: 82, w: 82, h: 326, ref_w: 640, ref_h: 480, angle: 0.0}
  a_star_min: 134                  # LAB a* cutoff: a pixel counts as red at a* >= this (128 = neutral)
  coverage_threshold: 0.011        # an arc counts as RED at >= this fraction of pixels above a_star_min
  morph_kernel: 3                  # MORPH_OPEN kernel (px) to despeckle the mask
  stable_seconds: 1.0              # both arcs must hold not-red this long before firing
  cooldown_seconds: 3.0            # min gap after a fire
  detect_interval_s: 0.2           # how often to sample the ROI in auto mode
